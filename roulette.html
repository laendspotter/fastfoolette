<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Food Roulette</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1b;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: #888;
    --mcdo: #DA291C;
    --bk: #FF8732;
    --kfc: #F40027;
    --doener: #2a7d3f;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 2rem; max-width: 480px; width: 100%; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    text-align: center;
    line-height: 1;
  }
  h1 span { color: #FF8732; }

  .toggles {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    transition: opacity 0.2s, background 0.2s, border-color 0.2s;
    user-select: none;
  }
  .toggle.off { opacity: 0.3; }
  .toggle:not(.off) { border-color: rgba(255,255,255,0.2); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .wheel-wrap {
    position: relative;
    width: min(340px, 90vw);
    height: min(340px, 90vw);
  }

  /* needle at top center pointing DOWN */
  .needle {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 0;
    height: 0;
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-top: 26px solid #f0ede8;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 50%;
  }

  .spin-btn {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 14px 52px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.15);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
    position: relative;
    overflow: hidden;
  }
  .spin-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent);
  }
  .spin-btn:hover { background: #252526; border-color: rgba(255,255,255,0.3); }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

  .result {
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }
  .result-emoji { font-size: 44px; line-height: 1; }
  .result-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .result-name.show { opacity: 1; transform: translateY(0); }
  .result-sub {
    font-size: 13px;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.4s 0.1s;
  }
  .result-sub.show { opacity: 1; }

  footer { font-size: 11px; color: #444; margin-top: 1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>fast food<br><span>roulette</span></h1>

  <div class="toggles" id="toggles"></div>

  <div class="wheel-wrap">
    <div class="needle"></div>
    <canvas id="wheel"></canvas>
  </div>

  <button class="spin-btn" id="spin-btn">drehen</button>

  <div class="result">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-name" id="result-name"></div>
    <div class="result-sub" id="result-sub"></div>
  </div>

  <footer>nur für josh</footer>
</div>

<script>
const PLACES = [
  { name: "McDonald's", emoji: "🍟", color: "#DA291C", sub: "nuggets go brr" },
  { name: "Burger King", emoji: "🍔", color: "#E07020", sub: "whopper time" },
  { name: "KFC",         emoji: "🍗", color: "#b50020", sub: "finger lickin good" },
  { name: "Döner",       emoji: "🌯", color: "#2a7d3f", sub: "klassiker" },
];

let active = [true, true, true, true];
let spinning = false;
// angle = current rotation of the wheel canvas
// we draw segment 0 starting at angle (top = -PI/2 + angle)
let angle = 0;

const canvas = document.getElementById('wheel');
const ctx    = canvas.getContext('2d');
const btn    = document.getElementById('spin-btn');
const rEmoji = document.getElementById('result-emoji');
const rName  = document.getElementById('result-name');
const rSub   = document.getElementById('result-sub');

function getActive() {
  return PLACES.filter((_, i) => active[i]);
}

function drawWheel(rot) {
  const size = canvas.offsetWidth * devicePixelRatio || 340 * devicePixelRatio;
  canvas.width  = size;
  canvas.height = size;
  const cx = size / 2, cy = size / 2, r = size / 2 - 2;

  const items = getActive();
  ctx.clearRect(0, 0, size, size);

  if (!items.length) return;

  const slice = (Math.PI * 2) / items.length;

  items.forEach((p, i) => {
    // segment i starts at rot + i*slice, measured from right (0 rad)
    // needle is at top = -PI/2
    const start = rot + i * slice;
    const end   = start + slice;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.strokeStyle = '#0e0e0f';
    ctx.lineWidth = 3 * devicePixelRatio;
    ctx.stroke();

    // label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = `${500} ${Math.round(13 * devicePixelRatio)}px 'DM Sans', sans-serif`;
    ctx.fillText(p.name, r - 14 * devicePixelRatio, 5 * devicePixelRatio);
    ctx.restore();
  });

  // center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 14 * devicePixelRatio, 0, Math.PI * 2);
  ctx.fillStyle = '#0e0e0f';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1.5 * devicePixelRatio;
  ctx.stroke();
}

// The needle points DOWN from the top = angle -PI/2 in canvas coords.
// Segment i occupies [rot + i*slice, rot + (i+1)*slice].
// needle angle in canvas coords = -PI/2
// we need: rot + i*slice <= -PI/2 < rot + (i+1)*slice  (mod 2PI)
function getWinner(finalAngle) {
  const items = getActive();
  if (!items.length) return null;
  const slice = (Math.PI * 2) / items.length;
  const needle = -Math.PI / 2; // top of canvas

  // normalize needle relative to rot
  let relative = ((needle - finalAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const idx = Math.floor(relative / slice) % items.length;
  return items[idx];
}

function buildToggles() {
  const row = document.getElementById('toggles');
  row.innerHTML = '';
  PLACES.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'toggle' + (active[i] ? '' : ' off');
    el.innerHTML = `<span class="dot" style="background:${p.color}"></span>${p.name}`;
    el.onclick = () => {
      const onCount = active.filter(Boolean).length;
      if (active[i] && onCount <= 1) return;
      active[i] = !active[i];
      el.classList.toggle('off');
      drawWheel(angle);
    };
    row.appendChild(el);
  });
}

btn.addEventListener('click', () => {
  if (spinning) return;
  const items = getActive();
  if (!items.length) return;

  spinning = true;
  btn.disabled = true;
  rName.classList.remove('show');
  rSub.classList.remove('show');
  rEmoji.textContent = '';

  const spins    = (6 + Math.random() * 6) * Math.PI * 2;
  const duration = 3200 + Math.random() * 800;
  const start    = performance.now();
  const startAng = angle;

  function ease(t) { return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    angle = startAng + spins * ease(t);
    drawWheel(angle);
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      btn.disabled = false;
      const winner = getWinner(angle);
      if (winner) {
        rEmoji.textContent = winner.emoji;
        rName.textContent  = winner.name;
        rSub.textContent   = winner.sub;
        // slight delay so it feels dramatic
        setTimeout(() => {
          rName.classList.add('show');
          rSub.classList.add('show');
        }, 80);
      }
    }
  }
  requestAnimationFrame(frame);
});

// redraw on resize
window.addEventListener('resize', () => drawWheel(angle));

buildToggles();
drawWheel(angle);
</script>
</body>
</html>
